name: Release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  generate-matrix:
    name: Generate Version Matrix
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-matrix.outputs.versions }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          python3 - << 'EOF'
          import json, os
          base_dir = 'versions'
          versions = []
          if os.path.isdir(base_dir):
              versions = sorted([
                  d for d in os.listdir(base_dir) 
                  if os.path.isdir(os.path.join(base_dir, d)) and not d.startswith('.')
              ])
          
          if not versions:
              print("::warning::No version directories found in versions/. Matrix will be empty.")
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'versions={json.dumps(versions)}\n')
          EOF

  build:
    name: Build ${{ matrix.minecraft_version }}
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        minecraft_version: ${{ fromJSON(needs.generate-matrix.outputs.versions) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Build module
        run: ./gradlew :${{ matrix.minecraft_version }}:build --no-daemon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.minecraft_version }}
          path: versions/${{ matrix.minecraft_version }}/build/libs/*.jar
          retention-days: 1
          if-no-files-found: error

  release:
    name: Publish to GitHub Releases
    needs: [generate-matrix, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: release-artifacts/
          merge-multiple: true

      - name: Filter out dev/sources/javadoc JARs
        run: |
          mkdir -p final-release
          find release-artifacts -type f -name "*.jar" \
            ! -name "*-dev.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            -exec cp {} final-release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: final-release/*.jar
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}