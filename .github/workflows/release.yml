name: Release
on:
  push:
    tags:
      - "v*"

# Required for creating/updating GitHub Releases
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.minecraft_version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        minecraft_version: ["1.20", "1.20.5", "1.21", "1.21.2", "1.21.9", "26.1.2"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # Build only the specific subproject for this matrix entry
      - name: Build module
        run: ./gradlew :${{ matrix.minecraft_version }}:build --no-daemon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.minecraft_version }}
          path: versions/${{ matrix.minecraft_version }}/build/libs/*.jar
          retention-days: 1
          if-no-files-found: error

  release:
    name: Publish to GitHub Releases
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: release-artifacts/
          merge-multiple: true

      - name: Filter out dev/sources/javadoc JARs
        run: |
          mkdir -p final-release
          find release-artifacts -type f -name "*.jar" \
            ! -name "*-dev.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            -exec cp {} final-release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: final-release/*.jar
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}